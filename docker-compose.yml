version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bolt-network

  redis-db:
    image: redis:alpine
    container_name: redis-db
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - bolt-network

  ws-relayer:
    image: rahulchaudharyji/bolty-ws-relayer:latest
    build:
      context: .
      dockerfile: apps/ws_layer/Dockerfile
    container_name: ws-relayer
    ports:
      - "9093:9093"
    networks:
      - bolt-network

  primary-backend:
    image: rahulchaudharyji/bolty-primary-backend:latest
    build:
      context: .
      dockerfile: apps/primarybackend/Dockerfile
    container_name: primary-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:mypassword@postgres-db:5432/postgres?sslmode=disable"
      REDIS_URL: "redis://redis-db:6379"
      JWT_PUBLICKEY: |
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAu2XjRy7eJJYNGPtzFXOU
        e0v0t+RuT5aBgq6T1O1b7abip9sH1ykZaqWY6liovzVfKGeOrw35RBX0Qs0e26xb
        oL0Zbl/Hey4A3CtFS9HFHaSCigvN1bgkrbkxNwm20OEXlCQm3/3ieYA/pqEvBJYY
        H8Vt3cUSBP12Sr06fnIKraAd1/b9f2J0IzmaWwUZbPMK4z2SYFd50tLdOEla/0KD
        StxJTL6orwwHpZKOxHFYF+IhI4D9HyL3h0YALmLTPDi6hmXZyAhJURkPx5w0aC5+
        RFL+HCxGjBGGdYSKIXJWq4pl/tf7DZw/nH31sMnkmajisVvCZjMRkBN3oT3MnOSk
        LwIDAQAB
        -----END PUBLIC KEY-----
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY}"
    depends_on:
      - postgres-db
      - redis-db
    networks:
      - bolt-network

  worker:
    image: rahulchaudharyji/bolty-worker:latest
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: worker
    ports:
      - "9091:9091"
      - "3001:3000"
      - "5173:5173"
      - "8081:8081"
    environment:
      DATABASE_URL: "postgresql://postgres:mypassword@postgres-db:5432/postgres?sslmode=disable"
      WS_RELAYER_URL: "ws://ws-relayer:9093"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      PROJECTS_DIR: "/tmp/projects"
    volumes:
      - projects_data:/tmp/projects
    depends_on:
      - postgres-db
      - ws-relayer
    networks:
      - bolt-network

  frontend:
    image: rahulchaudharyji/bolty-frontend:latest
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: frontend
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:3000"
      NEXT_PUBLIC_WS_URL: "ws://localhost:9093"
      NEXT_PUBLIC_VSCODE_URL: "http://localhost:8080"
      NEXT_PUBLIC_VSCODE_BASE_PATH: "/home/coder/projects"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY}"
    depends_on:
      - primary-backend
    networks:
      - bolt-network

  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    ports:
      - "8080:8080"
    volumes:
      - projects_data:/home/coder/projects
    environment:
      - PASSWORD=mypassword
    networks:
      - bolt-network

volumes:
  postgres_data:
  redis_data:
  projects_data:

networks:
  bolt-network:
    driver: bridge
